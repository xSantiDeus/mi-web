<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>PandaCompress - Comprimir imagen</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #111;
      text-align: center;
      padding: 40px;
    }

    h1 {
      font-size: 32px;
    }

    .box {
      background: #f5f5f5;
      padding: 25px;
      border-radius: 12px;
      display: inline-block;
      width: 320px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    input, button {
      margin: 10px;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      background: #111;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #333;
    }

    input[type="range"] {
      width: 100%;
    }

    .info {
      font-size: 14px;
      margin-top: 10px;
    }

    img {
      margin-top: 15px;
      max-width: 100%;
      border-radius: 8px;
    }

    .logo {
      font-size: 40px;
    }
  </style>
</head>

<body>

  <div class="logo">🐼</div>
  <h1>PandaCompress</h1>
  <p>Reducí el peso de tu imagen fácil y rápido</p>

  <div class="box">

    <input type="file" id="imageInput"><br>

    <label>Calidad: <span id="qualityValue">80</span>%</label>
    <input type="range" min="10" max="100" value="80" id="qualitySlider">

    <button onclick="compressImage()">Comprimir</button>

    <div class="info" id="sizes"></div>

    <a id="downloadLink" style="display:none;" download="imagen-comprimida.jpg">
      ⬇ Descargar imagen
    </a>

    <img id="preview">

  </div>

  <script>
    const slider = document.getElementById("qualitySlider");
    const qualityText = document.getElementById("qualityValue");

    // Esto arregla la barra
    slider.addEventListener("input", () => {
      qualityText.innerText = slider.value;
    });

    function compressImage() {
      const file = document.getElementById("imageInput").files[0];
      if (!file) return alert("Subí una imagen");

      const reader = new FileReader();

      reader.onload = function(event) {
        const img = new Image();
        img.src = event.target.result;

        img.onload = function() {
          const canvas = document.createElement("canvas");
          const ctx = canvas.getContext("2d");

          const scale = 0.7;
          canvas.width = img.width * scale;
          canvas.height = img.height * scale;

          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

          const quality = slider.value / 100;
          const compressedData = canvas.toDataURL("image/jpeg", quality);

          document.getElementById("preview").src = compressedData;

          const originalSize = (file.size / 1024).toFixed(2);
          const compressedSize = (compressedData.length / 1024).toFixed(2);

          document.getElementById("sizes").innerText =
            `Original: ${originalSize} KB → Comprimido: ${compressedSize} KB`;

          const link = document.getElementById("downloadLink");
          link.href = compressedData;
          link.style.display = "block";
        }
      };

      reader.readAsDataURL(file);
    }
  </script>

</body>
</html>
