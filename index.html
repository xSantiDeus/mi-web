<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PandaToolkit</title>

<style>
body {
  font-family: Arial;
  background: #fff;
  color: #111;
  text-align: center;
  padding: 20px;
  animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

h1 {
  margin-bottom: 5px;
}

.box {
  background: #f5f5f5;
  padding: 20px;
  border-radius: 12px;
  max-width: 350px;
  margin: auto;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

button {
  background: #111;
  color: white;
  padding: 10px;
  border: none;
  border-radius: 6px;
  margin: 8px;
  cursor: pointer;
}

button:hover {
  background: #333;
}

input {
  margin: 10px;
}

.tool-btn {
  background: #ddd;
  color: #111;
}

.tool-btn.active {
  background: #111;
  color: white;
}

#loader {
  display: none;
  margin-top: 10px;
}

.ad {
  margin: 20px auto;
  padding: 15px;
  background: #eee;
  max-width: 350px;
  font-size: 14px;
}
</style>
</head>

<body>

<h1>🐼 PandaToolkit</h1>
<p>Herramientas rápidas para imágenes</p>

<div class="ad">[ ANUNCIO ARRIBA ]</div>

<div class="box">

  <div>
    <button class="tool-btn active" onclick="setTool('compress')">Comprimir</button>
    <button class="tool-btn" onclick="setTool('convert')">JPG</button>
    <button class="tool-btn" onclick="setTool('resize')">Resize</button>
  </div>

  <input type="file" id="imageInput"><br>

  <div id="extraControls"></div>

  <button onclick="processImage()">Procesar</button>

  <div id="loader">Procesando...</div>

  <div id="sizes"></div>

  <button id="downloadBtn" style="display:none;">Descargar</button>

  <img id="preview">

</div>

<div class="ad">[ ANUNCIO ABAJO ]</div>

<script>
let currentTool = "compress";
let resultData = "";

function setTool(tool) {
  currentTool = tool;

  document.querySelectorAll(".tool-btn").forEach(btn => btn.classList.remove("active"));
  event.target.classList.add("active");

  const controls = document.getElementById("extraControls");

  if (tool === "compress") {
    controls.innerHTML = `
      Calidad: <input type="range" id="quality" min="10" max="100" value="70">
    `;
  }

  if (tool === "resize") {
    controls.innerHTML = `
      Ancho: <input type="number" id="width" value="300"><br>
      Alto: <input type="number" id="height" value="300">
    `;
  }

  if (tool === "convert") {
    controls.innerHTML = `Convertir a JPG automáticamente`;
  }
}

setTool("compress");

function processImage() {
  const file = document.getElementById("imageInput").files[0];
  if (!file) return alert("Subí una imagen");

  document.getElementById("loader").style.display = "block";

  const reader = new FileReader();

  reader.onload = function(e) {
    const img = new Image();
    img.src = e.target.result;

    img.onload = function() {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      let width = img.width;
      let height = img.height;

      if (currentTool === "resize") {
        width = document.getElementById("width").value;
        height = document.getElementById("height").value;
      }

      canvas.width = width;
      canvas.height = height;

      ctx.drawImage(img, 0, 0, width, height);

      let quality = 0.7;

      if (currentTool === "compress") {
        quality = document.getElementById("quality").value / 100;
      }

      resultData = canvas.toDataURL("image/jpeg", quality);

      document.getElementById("preview").src = resultData;

      document.getElementById("loader").style.display = "none";

      const originalSize = (file.size / 1024).toFixed(2);
      const newSize = (resultData.length / 1024).toFixed(2);

      document.getElementById("sizes").innerText =
        `Original: ${originalSize} KB → Nuevo: ${newSize} KB`;

      const btn = document.getElementById("downloadBtn");
      btn.style.display = "inline-block";
    };
  };

  reader.readAsDataURL(file);
}

document.getElementById("downloadBtn").onclick = () => {
  const a = document.createElement("a");
  a.href = resultData;
  a.download = "imagen.jpg";
  a.click();
};
</script>

</body>
</html>
