<body>

<div id="loader" style="display:none;">
<p>Procesando imagen...</p>
<div class="spinner"></div>

<div id="sizes"></div>

</div>

<script>
let currentTool="compress";
let resultData="";

function setTool(tool){
currentTool=tool;
document.querySelectorAll(".tool-btn").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");

let controls=document.getElementById("extraControls");

if(tool==="compress"){
controls.innerHTML=`Calidad <input type="range" id="quality" min="10" max="100" value="70">`;
}
if(tool==="resize"){
controls.innerHTML=`Ancho <input type="number" id="width" value="300"><br>Alto <input type="number" id="height" value="300">`;
}
if(tool==="convert"){ controls.innerHTML=`Convertir automĂĄticamente a JPG`; }
if(tool==="bw"){ controls.innerHTML=`Blanco y negro`; }
if(tool==="invert"){ controls.innerHTML=`Invertir colores`; }
}

setTool("compress");

function processImage(){
let file=document.getElementById("imageInput").files[0];
if(!file) return alert("SubĂ­ una imagen");

const loader=document.getElementById("loader");
loader.style.display="block";

let reader=new FileReader();

reader.onload=function(e){
let img=new Image();
img.src=e.target.result;

img.onload=function(){

let canvas=document.createElement("canvas");
let ctx=canvas.getContext("2d");

let width=img.width;
let height=img.height;

if(currentTool==="resize"){
width=document.getElementById("width").value;
height=document.getElementById("height").value;
}

canvas.width=width;
canvas.height=height;

ctx.drawImage(img,0,0,width,height);

if(currentTool==="bw"){
let data=ctx.getImageData(0,0,width,height);
for(let i=0;i<data.data.length;i+=4){
let avg=(data.data[i]+data.data[i+1]+data.data[i+2])/3;
data.data[i]=data.data[i+1]=data.data[i+2]=avg;
}
ctx.putImageData(data,0,0);
}

if(currentTool==="invert"){
let data=ctx.getImageData(0,0,width,height);
for(let i=0;i<data.data.length;i+=4){
data.data[i]=255-data.data[i];
data.data[i+1]=255-data.data[i+1];
data.data[i+2]=255-data.data[i+2];
}
ctx.putImageData(data,0,0);
}

let quality=0.7;
if(currentTool==="compress"){
quality=document.getElementById("quality").value/100;
}

resultData=canvas.toDataURL("image/jpeg",quality);

let preview=document.getElementById("preview");
preview.src=resultData;
preview.style.opacity=1;

loader.style.display="none";

let original=(file.size/1024).toFixed(2);
let newSize=(resultData.length/1024).toFixed(2);

document.getElementById("sizes").innerText=
`â Imagen optimizada con Ă©xito\n${original} KB â ${newSize} KB`;

document.getElementById("downloadBtn").style.display="inline-block";

};
};

reader.readAsDataURL(file);
}

document.getElementById("downloadBtn").onclick=function(){
let a=document.createElement("a");
a.href=resultData;
a.download="imagen.jpg";
a.click();
};
</script>
