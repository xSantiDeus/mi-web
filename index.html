<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Comprimir imagen online gratis</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f172a;
      color: white;
      padding: 40px;
    }
    .box {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      display: inline-block;
    }
    input, button {
      margin: 10px;
      padding: 10px;
      border-radius: 5px;
      border: none;
    }
    button {
      background: #22c55e;
      color: white;
      cursor: pointer;
    }
    img {
      margin-top: 20px;
      max-width: 300px;
    }
  </style>
</head>
<body>

  <h1>Comprimir imagen</h1>
  <p>Reducí el peso de tu imagen sin perder calidad</p>

  <div class="box">
    <input type="file" id="imageInput">
    <br>
    <button onclick="compressImage()">Comprimir</button>
    <br>
    <a id="downloadLink" style="display:none;" download="imagen-comprimida.jpg">Descargar imagen</a>
    <br>
    <img id="preview">
  </div>

  <script>
    function compressImage() {
      const file = document.getElementById("imageInput").files[0];
      if (!file) return alert("Subí una imagen");

      const reader = new FileReader();

      reader.onload = function(event) {
        const img = new Image();
        img.src = event.target.result;

        img.onload = function() {
          const canvas = document.createElement("canvas");
          const ctx = canvas.getContext("2d");

          // Reducimos tamaño (ajustable)
          const scale = 0.7;
          canvas.width = img.width * scale;
          canvas.height = img.height * scale;

          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

          // Comprimir calidad (0 a 1)
          const compressedData = canvas.toDataURL("image/jpeg", 0.6);

          document.getElementById("preview").src = compressedData;

          const link = document.getElementById("downloadLink");
          link.href = compressedData;
          link.style.display = "inline";
        }
      };

      reader.readAsDataURL(file);
    }
  </script>

</body>
</html>
