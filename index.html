<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Quitar fondo de imagen gratis</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f172a;
      color: white;
      padding: 40px;
    }
    .box {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      display: inline-block;
    }
    input, button {
      margin: 10px;
      padding: 10px;
      border-radius: 5px;
      border: none;
    }
    button {
      background: #22c55e;
      color: white;
      cursor: pointer;
    }
    img {
      margin-top: 20px;
      max-width: 300px;
    }
  </style>
</head>
<body>

  <h1>Quitar fondo de imagen</h1>
  <p>Subí tu imagen y eliminá el fondo gratis</p>

  <div class="box">
    <input type="file" id="imageInput">
    <br>
    <button onclick="removeBg()">Quitar fondo</button>
    <br>
    <img id="result">
  </div>

  <script>
    async function removeBg() {
      const file = document.getElementById("imageInput").files[0];
      if (!file) return alert("Subí una imagen");

      const formData = new FormData();
      formData.append("image_file", file);

      const response = await fetch("https://api.remove.bg/v1.0/removebg", {
        method: "POST",
        headers: {
          "X-Api-Key": "AL1qpYC8rVnpYcXmwL9PgnHk"
        },
        body: formData
      });

      const blob = await response.blob();
      const url = URL.createObjectURL(blob);

      document.getElementById("result").src = url;
    }
  </script>

</body>
</html>
